name: Galaxy FM SDK & Radio App Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Verify and Self-Heal Gradle Wrapper
      run: |
        echo "Verifying gradle-wrapper.jar integrity..."
        if ! java -jar gradle/wrapper/gradle-wrapper.jar --version > /dev/null 2>&1; then
          echo "Warning: gradle-wrapper.jar appears invalid or corrupt. Regenerating with system Gradle..."
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 9.3.1
        fi
        java -jar gradle/wrapper/gradle-wrapper.jar --version

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: false

    - name: Ensure Debug Keystore for Default Signing
      run: |
        if [ ! -f debug.keystore ]; then
          echo "Generating default debug.keystore for Android default signing..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        ls -lh debug.keystore

    - name: Grant execute permissions for gradlew
      run: chmod +x gradlew

    - name: Build Galaxy FM SDK Release AAR & Radio App Release APK
      run: ./gradlew :galaxyfmsdk:assembleRelease :app:assembleRelease --no-daemon --stacktrace

    - name: Prepare Artifacts
      run: |
        echo "Copying generated AAR and APK to required artifact filenames..."
        find galaxyfmsdk/build/outputs/aar/ -name "*release*.aar" -exec cp {} GalaxyFM-SDK-release.aar \;
        find app/build/outputs/apk/release/ -name "*release*.apk" -exec cp {} GalaxyFM-Radio-release.apk \;
        ls -lh GalaxyFM-SDK-release.aar GalaxyFM-Radio-release.apk

    - name: Upload Galaxy FM SDK Release AAR
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyFM-SDK-release
        path: GalaxyFM-SDK-release.aar

    - name: Upload Galaxy FM Radio Release APK
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyFM-Radio-release
        path: GalaxyFM-Radio-release.apk
