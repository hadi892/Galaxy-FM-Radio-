name: Galaxy FM SDK & Radio App Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permissions for gradlew
      run: chmod +x gradlew

    - name: Build Galaxy FM SDK Release AAR & Radio App Release APK
      run: ./gradlew :galaxyfmsdk:assembleRelease :app:assembleRelease --stacktrace

    - name: Prepare Artifacts
      run: |
        echo "Copying generated AAR and APK to required artifact filenames..."
        find galaxyfmsdk/build/outputs/aar/ -name "*release*.aar" -exec cp {} GalaxyFM-SDK-release.aar \;
        find app/build/outputs/apk/release/ -name "*release*.apk" -exec cp {} GalaxyFM-Radio-release.apk \;
        ls -lh GalaxyFM-SDK-release.aar GalaxyFM-Radio-release.apk

    - name: Upload Galaxy FM SDK Release AAR
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyFM-SDK-release
        path: GalaxyFM-SDK-release.aar

    - name: Upload Galaxy FM Radio Release APK
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyFM-Radio-release
        path: GalaxyFM-Radio-release.apk
